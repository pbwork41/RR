<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер смен — Lady Stretch</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --text:#1a1a2e;--text2:#555570;--text3:#888899;
  --border:#e0e0eb;--border2:#c8c8d8;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg3);color:var(--text);font-size:15px;min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1rem}
.topbar{background:var(--blue);color:#fff;padding:14px 20px;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;font-family:inherit;white-space:nowrap;text-align:center}
.tab.active{background:var(--blue);color:#fff}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-muted{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:580px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:.75rem 1rem;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
.metric-val{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.progress-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s ease}
.progress-wrap-sm{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill-sm{height:100%;border-radius:3px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:8px 12px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
.form-row{margin-bottom:10px}
.btn{padding:9px 18px;font-size:14px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{color:var(--red-text);border-color:#fca5a5}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.subsection-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.line{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.line:last-child{border-bottom:none}
.line-label{color:var(--text2)}
.line-val{font-weight:600}
.total-line{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:16px;font-weight:700;border-top:2px solid var(--border);margin-top:6px}
.shift-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem 1rem;margin-bottom:8px;background:var(--bg)}
.shift-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.shift-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tag-imp{background:#eff6ff;color:#1d4ed8}
.tag-mec{background:#f5f3ff;color:#6d28d9}
.chip{background:var(--bg2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
.chip-blue{background:var(--blue-bg);color:var(--blue-text);border-color:#bfdbfe;font-weight:600}
.chip-green{background:var(--green-bg);color:var(--green-text);border-color:#86efac;font-weight:500}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.cert-block{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem;margin-bottom:8px;background:var(--bg2)}
.cert-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:min(540px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:17px;font-weight:700}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px}
.alert-red{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5}
.pin-input{text-align:center;font-size:28px;letter-spacing:10px;font-weight:700}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.salary-box{background:linear-gradient(135deg,var(--blue-bg),#f0f4ff);border:1px solid #bfdbfe;border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.salary-total{font-size:32px;font-weight:800;color:var(--blue-text)}
.hint{font-size:11px;color:var(--text3);margin-top:4px}
.funnel-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.funnel-row:last-child{border-bottom:none}
.funnel-label{flex:1;color:var(--text2)}
.funnel-val{font-weight:600;min-width:40px;text-align:right}
.funnel-pct{min-width:50px;text-align:right;color:var(--text3);font-size:12px}
.marathon-banner{border:2px solid var(--amber);background:var(--amber-bg);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
.marathon-banner-title{font-size:14px;font-weight:700;color:var(--amber-text);margin-bottom:2px}
.marathon-banner-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.marathon-banner-prize{font-size:22px;font-weight:800;color:var(--amber-text)}

.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;margin:0 auto 12px}
.profile-name{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.profile-studio{text-align:center;margin-bottom:16px}
.profile-section{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;flex-wrap:wrap}
.history-row:last-child{border-bottom:none}
</style>
</head>

<script>
const SUPABASE_URL='https://nhiyoilfegmmvdtqsgkm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oaXlvaWxmZWdtbXZkdHFzZ2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDc0MTMsImV4cCI6MjA5NjE4MzQxM30.VL7a64jalOvhGC3yLMdeR-qR1Jlffht-uYcYmwDn7oQ';
const PIN='0000';
const IMP_PLAN=1800000,MEC_PLAN=1200000;
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let shifts=[],marathons=[],editingId=null,pinCb=null,addCertN=0,editCertN=0;

function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')}
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(){return today().slice(0,7)}
function monthLabel(){return new Date().toLocaleString('ru-RU',{month:'long',year:'numeric'})}

// Ран рейт по календарным дням
function calcRR(fact){
  const now=new Date();
  const dayOfMonth=now.getDate();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  if(dayOfMonth===0)return 0;
  return Math.round(fact/dayOfMonth*daysInMonth);
}

async function loadData(){
  document.getElementById('sync-text').textContent='загрузка...';
  const m=monthKey();
  const [{data:sd},{data:md}]=await Promise.all([
    sb.from('shifts').select('*').gte('date',m+'-01').lte('date',m+'-31').order('date',{ascending:false}),
    sb.from('marathons').select('*').eq('active',true).gte('date_end',today())
  ]);
  shifts=(sd||[]).map(r=>({
    id:r.id,date:r.date,studio:r.studio,admin:r.admin,
    newSales:+r.new_sales||0,renew:+r.renew||0,restore:+r.restore||0,
    certs:r.certs||[],leads:+r.leads||0,bookings:+r.bookings||0,visits:+r.visits||0,
    massage:+r.massage_bookings||0,reviews:+r.reviews||0
  }));
  marathons=md||[];
  document.getElementById('sync-text').textContent='синхронизировано ✓';
  renderAll();
}

function cashBonus(studio,cash){
  if(studio==='Империал'){if(cash>=100000)return 2500;if(cash>=80000)return 1500;if(cash>=60000)return 1000;return 0;}
  else{if(cash>=70000)return 2500;if(cash>=55000)return 1500;if(cash>=40000)return 1000;return 0;}
}

function calcShift(s){
  const cash=s.newSales+s.renew+s.restore;
  const fix=1500,pNew=Math.round(s.newSales*0.05),pRenew=Math.round(s.renew*0.08),pRestore=Math.round(s.restore*0.10);
  const bonus=cashBonus(s.studio,cash);
  const certs=s.certs||[];
  const certBonus=certs.filter(c=>c.came).length*500;
  const certSales=certs.filter(c=>c.came&&c.bought).reduce((a,c)=>a+(+c.amount||0),0);
  const pCert=Math.round(certSales*0.05);
  return{fix,pNew,pRenew,pRestore,bonus,certBonus,pCert,cash,total:fix+pNew+pRenew+pRestore+bonus+certBonus+pCert};
}

function badge(p){
  if(p>=100)return`<span class="badge badge-green">✓ В плане</span>`;
  if(p>=85)return`<span class="badge badge-amber">⚠ Нужно ускориться</span>`;
  return`<span class="badge badge-red">✗ Отстаём</span>`;
}

// Считаем прогресс администратора по условию марафона
function marathonProgress(m, adminShifts){
  const ss=adminShifts.filter(s=>s.date>=m.date_start&&s.date<=m.date_end);
  const type=m.condition_type;
  let val=0;
  if(type==='revenue') val=ss.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  else if(type==='new_sales') val=ss.filter(s=>s.newSales>0).length;
  else if(type==='renewals') val=ss.filter(s=>s.renew>0).length;
  else if(type==='bookings') val=ss.reduce((a,s)=>a+s.bookings,0);
  else if(type==='visits') val=ss.reduce((a,s)=>a+s.visits,0);
  else if(type==='massage') val=ss.reduce((a,s)=>a+s.massage,0);
  else if(type==='reviews') val=ss.reduce((a,s)=>a+s.reviews,0);
  else if(type==='conv_cv3'){
    const visits=ss.reduce((a,s)=>a+s.visits,0);
    const sales=ss.filter(s=>s.newSales>0).length;
    val=visits>0?Math.round(sales/visits*100):0;
  }
  const target=+m.condition_value||1;
  const pct=Math.min(Math.round(val/target*100),100);
  const done=val>=target;
  return{val,target,pct,done};
}

function conditionLabel(type,val){
  const labels={
    revenue:`Выручка ≥ ${fmt(val)} ₽`,
    new_sales:`Новых продаж ≥ ${val} шт`,
    renewals:`Продлений ≥ ${val} шт`,
    bookings:`Записей на пробное ≥ ${val} шт`,
    visits:`Доходимость ≥ ${val} чел`,
    massage:`Записей на массаж ≥ ${val} шт`,
    reviews:`Отзывов ≥ ${val} шт`,
    conv_cv3:`Конверсия приход→продажа ≥ ${val}%`,
  };
  return labels[type]||val;
}

  div.className='cert-block';div.id=`cert-${mode}-${n}`;

  cont.appendChild(div);
}
function toggleCame(sel,id){document.getElementById('bought-wrap-'+id).style.display=sel.value==='1'?'block':'none';document.getElementById('amount-wrap-'+id).style.display='none';}
function toggleBought(sel,id){document.getElementById('amount-wrap-'+id).style.display=sel.value==='1'?'block':'none';}
function getCerts(contId){
  return[...document.getElementById(contId).querySelectorAll('.cert-block')].map(b=>({

function doEdit(id){
  editingId=id;
  const s=shifts.find(x=>x.id===id);if(!s)return;
  document.getElementById('e-date').value=s.date;
  document.getElementById('e-studio').value=s.studio;
  document.getElementById('e-admin').value=s.admin||'Анна';
  document.getElementById('e-new').value=s.newSales||0;
  document.getElementById('e-renew').value=s.renew||0;
  document.getElementById('e-restore').value=s.restore||0;
  document.getElementById('e-leads').value=s.leads||0;
  document.getElementById('e-bookings').value=s.bookings||0;
  document.getElementById('e-visits').value=s.visits||0;
  document.getElementById('e-massage').value=s.massage||0;
  document.getElementById('e-reviews').value=s.reviews||0;
  document.getElementById('edit-certs').innerHTML='';editCertN=0;
  (s.certs||[]).forEach(c=>{
    addCert('edit');const n=editCertN-1;
    const b=document.getElementById(`cert-edit-${n}`);
    b.querySelector('[data-f="giver"]').value=c.giver||'';
    b.querySelector('[data-f="visitor"]').value=c.visitor||'';
    const cEl=b.querySelector('[data-f="came"]');cEl.value=c.came?'1':'0';toggleCame(cEl,`edit-${n}`);
    const bEl=b.querySelector('[data-f="bought"]');if(bEl){bEl.value=c.bought?'1':'0';toggleBought(bEl,`edit-${n}`);}
    const aEl=b.querySelector('[data-f="amount"]');if(aEl)aEl.value=c.amount||0;
  });
  document.getElementById('edit-error').style.display='none';
  document.getElementById('edit-modal').style.display='flex';
}

      <div id="auth-error" class="alert alert-red" style="display:none"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="doLogin()">Войти</button>
        <button class="btn" style="flex:1" onclick="doRegister()">Регистрация</button>
      </div>
    </div>`;
}

function simpleHash(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}
  return Math.abs(h).toString(36);
}

async function doLogin(){
  const name=document.getElementById('auth-name').value;
  const pass=document.getElementById('auth-pass').value;
  if(!name||!pass){showAuthErr('Заполните все поля');return;}
  const hash=simpleHash(name+pass);
  const {data}=await sb.from('profiles').select('*').eq('name',name).single();
  if(!data){showAuthErr('Пользователь не найден. Сначала зарегистрируйтесь.');return;}
  if(data.password_hash!==hash){showAuthErr('Неверный пароль');return;}
  currentProfile={name,studio:data.studio||''};
  renderProfileHome();
}

async function doRegister(){
  const name=document.getElementById('auth-name').value;
  const pass=document.getElementById('auth-pass').value;
  if(!name||!pass){showAuthErr('Заполните все поля');return;}
  if(pass.length<4){showAuthErr('Пароль минимум 4 символа');return;}
  const hash=simpleHash(name+pass);
  // Check if exists
  const {data:existing}=await sb.from('profiles').select('id').eq('name',name).single();
  if(existing){showAuthErr('Пользователь уже зарегистрирован. Войдите.');return;}
  // Detect studio from shifts
  const myShifts=shifts.filter(s=>s.admin===name);
  const studio=myShifts.length>0?myShifts[0].studio:'';
  const {error}=await sb.from('profiles').insert({name,password_hash:hash,studio});
  if(error){showAuthErr('Ошибка: '+error.message);return;}
  currentProfile={name,studio};
  renderProfileHome();
}

function showAuthErr(msg){
  const el=document.getElementById('auth-error');
  el.textContent=msg;el.style.display='block';
}

function renderProfileHome(){
  const el=document.getElementById('profile-content');
  const name=currentProfile.name;
  const myShifts=shifts.filter(s=>s.admin===name);
  const m=monthKey();
  const myShiftsMonth=myShifts.filter(s=>s.date.startsWith(m));

  // Stats
  const revenue=myShiftsMonth.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  const leads=myShiftsMonth.reduce((a,s)=>a+s.leads,0);
  const bookings=myShiftsMonth.reduce((a,s)=>a+s.bookings,0);
  const visits=myShiftsMonth.reduce((a,s)=>a+s.visits,0);
  const newSales=myShiftsMonth.filter(s=>s.newSales>0).length;
  const renewals=myShiftsMonth.filter(s=>s.renew>0).length;
  const massage=myShiftsMonth.reduce((a,s)=>a+s.massage,0);
  const reviews=myShiftsMonth.reduce((a,s)=>a+s.reviews,0);
  const cv3=visits>0?Math.round(newSales/visits*100):null;
  const studio=myShiftsMonth[0]?.studio||currentProfile.studio||'—';

  // Salary
  let fix=0,pNew=0,pRenew=0,pRestore=0,bonus=0,certB=0,pCert=0;
  myShiftsMonth.forEach(s=>{const sal=calcShift(s);fix+=sal.fix;pNew+=sal.pNew;pRenew+=sal.pRenew;pRestore+=sal.pRestore;bonus+=sal.bonus;certB+=sal.certBonus;pCert+=sal.pCert;});
  const salTotal=fix+pNew+pRenew+pRestore+bonus+certB+pCert;
  const now=new Date();
  const day=now.getDate();
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const salEst=day>0?Math.round(salTotal/day*dim):0;

  // Active marathons progress
  const activeM=marathons.filter(mm=>mm.active&&mm.date_end>=today());

  // History (last 10 shifts)
  const history=[...myShifts].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);

  const pillCls=studio==='Империал'?'tag-imp':'tag-mec';

  el.innerHTML=`
    <div class="card">
      <div class="profile-avatar">${name[0]}</div>
      <div class="profile-name">${name}</div>
      <div class="profile-studio"><span class="tag ${pillCls}">${studio}</span></div>
      <button class="btn btn-sm" style="display:block;margin:0 auto" onclick="logoutProfile()">Выйти</button>
    </div>

    <div class="profile-section">📊 Мои показатели — ${monthLabel()}</div>
    <div class="grid3" style="margin-bottom:12px">
      <div class="metric"><div class="metric-label">Выручка</div><div class="metric-val" style="font-size:17px">${fmt(revenue)} ₽</div></div>
      <div class="metric"><div class="metric-label">Смен</div><div class="metric-val" style="font-size:17px">${myShiftsMonth.length}</div></div>
      <div class="metric"><div class="metric-label">CV→продажа</div><div class="metric-val" style="font-size:17px">${cv3!==null?cv3+'%':'—'}</div></div>
    </div>
    <div class="grid4" style="margin-bottom:4px">
      <div class="metric"><div class="metric-label">Лиды</div><div class="metric-val" style="font-size:16px">${leads||'—'}</div></div>
      <div class="metric"><div class="metric-label">Записи</div><div class="metric-val" style="font-size:16px">${bookings||'—'}</div></div>
      <div class="metric"><div class="metric-label">Массаж</div><div class="metric-val" style="font-size:16px">${massage||'—'}</div></div>
      <div class="metric"><div class="metric-label">Отзывы</div><div class="metric-val" style="font-size:16px">${reviews||'—'}</div></div>
    </div>

    <div class="profile-section">💰 Моя зарплата</div>
    <div class="salary-box">
      <div style="font-size:11px;color:var(--blue-text);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">За ${myShiftsMonth.length} смен этого месяца</div>
      <div class="salary-total">${fmt(salTotal)} ₽</div>
      <div style="font-size:13px;color:var(--blue-text);margin-top:6px;font-weight:600">Прогноз на месяц: ${fmt(salEst)} ₽</div>
    </div>
    <div class="card">
      ${[
        {label:`Оклад (${myShiftsMonth.length} × 1 500 ₽)`,val:fix},
        {label:'Новые абонементы (5%)',val:pNew},
        {label:'Продления (8%)',val:pRenew},
        {label:'Восстановление (10%)',val:pRestore},
        {label:'Бонус за кассу',val:bonus},
        {label:'Сертификаты',val:certB+pCert},
      ].map(i=>`<div class="history-row"><span style="color:var(--text2)">${i.label}</span><span style="font-weight:600">${fmt(i.val)} ₽</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:15px;font-weight:700;border-top:2px solid var(--border);margin-top:4px"><span>Итого</span><span>${fmt(salTotal)} ₽</span></div>
    </div>

    ${activeM.length?`<div class="profile-section">🏆 Мои марафоны</div>
    ${activeM.map(mm=>{
      const prog=marathonProgress(mm,myShiftsMonth);
      const color=prog.done?'var(--green)':prog.pct>=50?'var(--amber)':'var(--red)';
      return`<div class="marathon-banner" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;gap:12px">
          <div style="flex:1">
            <div class="marathon-banner-title">🏆 ${mm.title}</div>
            <div class="marathon-banner-desc">${mm.condition_type?conditionLabel(mm.condition_type,mm.condition_value):mm.description||''}</div>
            <div class="progress-wrap-sm"><div class="progress-fill-sm" style="width:${prog.pct}%;background:${color}"></div></div>
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--amber-text)">
              <span>${prog.done?'✅ Выполнено!':'Мой прогресс: '+prog.val+' / '+prog.target}</span>
              <span>${prog.pct}%</span>
            </div>
          </div>
          <div class="marathon-banner-prize">${fmt(mm.prize)} ₽</div>
        </div>
      </div>`;
    }).join('')}`:''}

    <div class="profile-section">📅 История смен</div>
    <div class="card">
      ${history.length?history.map(s=>{
        const sal=calcShift(s);
        const cash=s.newSales+s.renew+s.restore;
        const cls=s.studio==='Империал'?'tag-imp':'tag-mec';
        return`<div class="history-row">
          <span style="color:var(--text3);min-width:80px">${s.date}</span>
          <span class="tag ${cls}" style="font-size:11px">${s.studio}</span>
          <span style="font-weight:600">${fmt(cash)} ₽</span>
          <span style="color:var(--blue-text);font-weight:600">${fmt(sal.total)} ₽ ЗП</span>
        </div>`;
      }).join(''):'<div style="color:var(--text3);text-align:center;padding:1rem">Смен ещё нет</div>'}
    </div>`;
}

function logoutProfile(){
  currentProfile=null;
  renderProfileAuth();
}

function conditionLabel(type,val){
  const labels={revenue:'Выручка ≥ '+fmt(val)+' ₽',new_sales:'Новых продаж ≥ '+val+' шт',renewals:'Продлений ≥ '+val+' шт',bookings:'Записей ≥ '+val+' шт',visits:'Доходимость ≥ '+val+' чел',massage:'Массаж ≥ '+val+' шт',reviews:'Отзывов ≥ '+val+' шт',conv_cv3:'CV приход→продажа ≥ '+val+'%'};
  return labels[type]||val;
}

document.getElementById('month-label').textContent=monthLabel();
loadData();
</script>
</body>
</html>
