<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lady Stretch</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --text:#1a1a2e;--text2:#555570;--text3:#888899;
  --border:#e0e0eb;--border2:#c8c8d8;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg3);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
.app{max-width:860px;margin:0 auto;padding:1rem}
.topbar{background:var(--blue);color:#fff;padding:14px 20px;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;font-family:inherit;white-space:nowrap;text-align:center}
.tab.active{background:var(--blue);color:#fff}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-muted{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:580px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:.75rem 1rem;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
.metric-val{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.progress-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s ease}
.progress-wrap-sm{height:6px;background:rgba(0,0,0,.1);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill-sm{height:100%;border-radius:3px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:8px 12px;font-size:16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
.form-row{margin-bottom:10px}
.btn{padding:9px 18px;font-size:14px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{color:var(--red-text);border-color:#fca5a5}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.subsection-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tag-imp{background:#eff6ff;color:#1d4ed8}
.tag-mec{background:#f5f3ff;color:#6d28d9}
.chip{background:var(--bg2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
.chip-green{background:var(--green-bg);color:var(--green-text);border-color:#86efac;font-weight:500}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.shift-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem 1rem;margin-bottom:8px;background:var(--bg)}
.cert-block{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem;margin-bottom:8px;background:var(--bg2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:min(540px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:17px;font-weight:700}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px}
.alert-red{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5}
.alert-green{background:var(--green-bg);color:var(--green-text);border:1px solid #86efac}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.salary-box{background:linear-gradient(135deg,var(--blue-bg),#f0f4ff);border:1px solid #bfdbfe;border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.salary-total{font-size:32px;font-weight:800;color:var(--blue-text)}
.hint{font-size:11px;color:var(--text3);margin-top:4px}
.funnel-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.funnel-row:last-child{border-bottom:none}
.funnel-label{flex:1;color:var(--text2)}
.funnel-val{font-weight:600;min-width:40px;text-align:right}
.funnel-pct{min-width:50px;text-align:right;color:var(--text3);font-size:12px}
.marathon-banner{border:2px solid var(--amber);background:var(--amber-bg);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
.marathon-banner-title{font-size:14px;font-weight:700;color:var(--amber-text);margin-bottom:2px}
.marathon-banner-prize{font-size:22px;font-weight:800;color:var(--amber-text)}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 12px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;flex-wrap:wrap}
.history-row:last-child{border-bottom:none}
/* AUTH SCREEN */
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1d4ed8,#7c3aed);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem;z-index:999;display:flex;align-items:flex-start;justify-content:center}
.auth-card{background:var(--bg);border-radius:16px;padding:1.25rem;width:min(380px,100%);box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto}
.auth-logo{text-align:center;margin-bottom:16px}
.auth-logo-title{font-size:20px;font-weight:800;color:var(--blue);margin-bottom:2px}
.auth-logo-sub{font-size:12px;color:var(--text3)}
.auth-tabs{display:flex;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;margin-bottom:14px;gap:3px}
.auth-tab{flex:1;padding:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;border-radius:var(--radius-sm);font-family:inherit;color:var(--text2);transition:all .15s;text-align:center}
.auth-tab.active{background:var(--bg);color:var(--blue);font-weight:600;box-shadow:var(--shadow)}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:10px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--border2);transition:all .2s}
.pin-dot.filled{background:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.pin-btn{padding:12px;font-size:18px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.pin-btn:active{background:var(--blue-bg);border-color:var(--blue)}
.pin-btn.del{font-size:14px;color:var(--text3)}
.inactive-msg{text-align:center;padding:1.5rem;color:var(--amber-text);background:var(--amber-bg);border-radius:var(--radius);border:1px solid var(--amber);font-size:14px}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:32px;margin-bottom:6px">💪</div>
      <div class="auth-logo-title">Lady Stretch</div>
      <div class="auth-logo-sub">Система учёта смен</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login">Вход</button>
      <button class="auth-tab" id="auth-tab-register">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="auth-login">
      <div class="form-row"><label>Имя</label><input type="text" id="login-first" placeholder="Анна" autocomplete="given-name"></div>
      <div class="form-row"><label>Фамилия</label><input type="text" id="login-last" placeholder="Иванова" autocomplete="family-name"></div>

      <div class="pin-dots" id="login-dots">

        <div class="pin-dot" id="ld1"></div>
        <div class="pin-dot" id="ld2"></div>
        <div class="pin-dot" id="ld3"></div>
      </div>
      <div class="pin-pad" id="login-pad"></div>
      <button class="btn btn-primary btn-block" style="margin-top:14px" id="login-submit-btn">Войти</button>
      <div id="login-error" class="alert alert-red" style="display:none;margin-top:12px"></div>
    </div>

    <!-- REGISTER -->
    <div id="auth-register" style="display:none">
      <div class="grid2">
        <div class="form-row"><label>Имя</label><input type="text" id="reg-first" placeholder="Анна"></div>
        <div class="form-row"><label>Фамилия</label><input type="text" id="reg-last" placeholder="Иванова"></div>

        <div class="pin-dot" id="rd1"></div>

        <div class="pin-dot" id="rd3"></div>
      </div>
      <div class="pin-pad" id="reg-pad"></div>
      <button class="btn btn-primary btn-block" style="margin-top:14px" id="reg-submit-btn">Зарегистрироваться</button>
      <div id="reg-error" class="alert alert-red" style="display:none;margin-top:12px"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">Lady Stretch</div>
      <div class="topbar-sub" id="month-label"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">

  <div id="tab-shifts" class="section"><div id="shifts-list"></div></div>

</div>
</div>

</div>
</div>

  <div class="subsection-title">Продажи за смену</div>

    <div class="form-row"><label>Новые абонементы, ₽</label><input type="number" id="e-new" min="0"></div>

<script>
const SUPABASE_URL='https://nhiyoilfegmmvdtqsgkm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oaXlvaWxmZWdtbXZkdHFzZ2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDc0MTMsImV4cCI6MjA5NjE4MzQxM30.VL7a64jalOvhGC3yLMdeR-qR1Jlffht-uYcYmwDn7oQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const IMP_PLAN=1800000,MEC_PLAN=1200000;
let shifts=[],marathons=[],currentUser=null,editingId=null,addCertN=0,editCertN=0;
let loginPin='',regPin='';

function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')}
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(){return today().slice(0,7)}
function monthLabel(){return new Date().toLocaleString('ru-RU',{month:'long',year:'numeric'})}
function calcRR(fact){
  const now=new Date(),d=now.getDate(),dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return d>0?Math.round(fact/d*dim):0;
}
function simpleHash(str){
  let h=0;for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}return Math.abs(h).toString(36);
}

// ===== AUTH =====
function buildPinPad(padId, mode){
  const pad=document.getElementById(padId);
  if(!pad)return;
  pad.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='pin-btn'+(n==='⌫'?' del':'');
    btn.textContent=n;
    if(n===''){btn.style.visibility='hidden';}
    else{
      btn.addEventListener('click',function(e){
        e.preventDefault();
        if(n==='⌫'){
          if(mode==='login'){loginPin=loginPin.slice(0,-1);}
          else{regPin=regPin.slice(0,-1);}
        } else {
          if(mode==='login'&&loginPin.length<4){loginPin+=String(n);}
          else if(mode==='reg'&&regPin.length<4){regPin+=String(n);}
        }
        updateDots(mode);
      });
    }

function switchAuthTab(t){
  document.getElementById('auth-login').style.display=t==='login'?'block':'none';
  document.getElementById('auth-register').style.display=t==='register'?'block':'none';
  document.getElementById('auth-tab-login').classList.toggle('active',t==='login');
  document.getElementById('auth-tab-register').classList.toggle('active',t==='register');
  loginPin='';regPin='';updateDots('login');updateDots('reg');
}

function updateDots(mode){
  const pin=mode==='login'?loginPin:regPin;
  const prefix=mode==='login'?'ld':'rd';
  for(let i=0;i<4;i++){
    const d=document.getElementById(prefix+i);
    if(d)d.classList.toggle('filled',i<pin.length);
  }
}

function showAuthErr(mode,msg){
  const id=mode==='login'?'login-error':'reg-error';
  const el=document.getElementById(id);
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
  if(mode==='login'){loginPin='';updateDots('login');}
  else{regPin='';updateDots('reg');}
}

async function doLogin(){
  const first=document.getElementById('login-first').value.trim();
  const last=document.getElementById('login-last').value.trim();
  if(!first||!last){showAuthErr('login','Введите имя и фамилию');return;}
  const fullName=first+' '+last;
  const hash=simpleHash(fullName+loginPin);
  const {data,error}=await sb.from('profiles').select('*').eq('name',fullName).single();
  if(!data){showAuthErr('login','Пользователь не найден');return;}
  if(data.password_hash!==hash){showAuthErr('login','Неверный пин-код');return;}
  if(!data.active){
    document.getElementById('auth-screen').innerHTML=`<div class="auth-card"><div class="auth-logo"><div style="font-size:40px">⏳</div><div class="auth-logo-title">Lady Stretch</div></div><div class="inactive-msg">Ваш аккаунт ожидает активации руководителем. Обратитесь к администратору.</div><button class="btn btn-sm" style="margin-top:16px;display:block;margin-left:auto;margin-right:auto" onclick="location.reload()">↩ Назад</button></div>`;
    return;
  }
  // Save session
  localStorage.setItem('ls_session',JSON.stringify({name:fullName,id:data.id}));
  currentUser={name:fullName,id:data.id};
  enterApp();
}

async function doRegister(){
  const first=document.getElementById('reg-first').value.trim();
  const last=document.getElementById('reg-last').value.trim();
  if(!first||!last){showAuthErr('reg','Введите имя и фамилию');return;}
  if(regPin.length<4){showAuthErr('reg','Введите 4 цифры пин-кода');return;}
  const fullName=first+' '+last;
  const hash=simpleHash(fullName+regPin);
  const {data:existing}=await sb.from('profiles').select('id').eq('name',fullName).single();
  if(existing){showAuthErr('reg','Пользователь уже зарегистрирован');return;}
  const {error}=await sb.from('profiles').insert({name:fullName,password_hash:hash,active:false});
  if(error){showAuthErr('reg','Ошибка: '+error.message);return;}
  // Show success
  document.getElementById('auth-register').innerHTML=`<div class="alert alert-green">✓ Регистрация прошла успешно! Дождитесь активации от руководителя.</div>`;
  regPin='';
}

// Check saved session on load
async function checkSession(){
  const saved=localStorage.getItem('ls_session');
  if(!saved){return;}
  try{
    const s=JSON.parse(saved);
    const {data}=await sb.from('profiles').select('*').eq('id',s.id).single();

function cashBonus(studio,cash){
  if(studio==='Империал'){if(cash>=100000)return 2500;if(cash>=80000)return 1500;if(cash>=60000)return 1000;return 0;}
  else{if(cash>=70000)return 2500;if(cash>=55000)return 1500;if(cash>=40000)return 1000;return 0;}
}

function calcShift(s){
  const cash=s.newSales+s.renew+s.restore;
  const fix=1500,pNew=Math.round(s.newSales*0.05),pRenew=Math.round(s.renew*0.08),pRestore=Math.round(s.restore*0.10);
  const bonus=cashBonus(s.studio,cash);
  const certs=s.certs||[];
  const certBonus=certs.filter(c=>c.came).length*500;
  const certSales=certs.filter(c=>c.came&&c.bought).reduce((a,c)=>a+(+c.amount||0),0);
  const pCert=Math.round(certSales*0.05);
  return{fix,pNew,pRenew,pRestore,bonus,certBonus,pCert,cash,total:fix+pNew+pRenew+pRestore+bonus+certBonus+pCert};
}

function badge(p){
  if(p>=100)return`<span class="badge badge-green">✓ В плане</span>`;
  if(p>=85)return`<span class="badge badge-amber">⚠ Ускориться</span>`;
  return`<span class="badge badge-red">✗ Отстаём</span>`;
}

function conditionLabel(type,val){
  const m={revenue:'Выручка ≥ '+fmt(val)+' ₽',new_sales:'Новых продаж ≥ '+val+' шт',renewals:'Продлений ≥ '+val+' шт',bookings:'Записей ≥ '+val+' шт',visits:'Доходимость ≥ '+val+' чел',massage:'Массаж ≥ '+val+' шт',reviews:'Отзывов ≥ '+val+' шт',conv_cv3:'CV ≥ '+val+'%',restore:'Возвратов ≥ '+val+' шт'};
  return m[type]||val;
}

function marathonProgress(m,ss){
  const ms=ss.filter(s=>s.date>=m.date_start&&s.date<=m.date_end);
  const type=m.condition_type;
  let val=0;
  if(type==='revenue')val=ms.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  else if(type==='new_sales')val=ms.filter(s=>s.newSales>0).length;
  else if(type==='renewals')val=ms.filter(s=>s.renew>0).length;
  else if(type==='restore')val=ms.filter(s=>s.restore>0).length;
  else if(type==='bookings')val=ms.reduce((a,s)=>a+s.bookings,0);
  else if(type==='visits')val=ms.reduce((a,s)=>a+s.visits,0);
  else if(type==='massage')val=ms.reduce((a,s)=>a+s.massage,0);
  else if(type==='reviews')val=ms.reduce((a,s)=>a+s.reviews,0);
  else if(type==='conv_cv3'){const v=ms.reduce((a,s)=>a+s.visits,0);const sv=ms.filter(s=>s.newSales>0).length;val=v>0?Math.round(sv/v*100):0;}
  const target=+m.condition_value||1;
  const pct=Math.min(Math.round(val/target*100),100);
  return{val,target,pct,done:val>=target};
}

          <div class="marathon-banner-prize">${fmt(mm.prize)} ₽</div>
        </div>
      </div>`;
    }).join('')}`:''}

    <div class="subsection-title">📅 История смен</div>
    <div class="card">
      ${history.length?history.map(s=>{
        const cash=s.newSales+s.renew+s.restore;
        const cls=s.studio==='Империал'?'tag-imp':'tag-mec';
        return`<div class="history-row">
          <span style="color:var(--text3);min-width:80px">${s.date}</span>
          <span class="tag ${cls}">${s.studio}</span>
          <span style="font-weight:600">${fmt(cash)} ₽</span>
        </div>`;
      }).join(''):'<div style="color:var(--text3);text-align:center;padding:1rem">Смен ещё нет</div>'}
    </div>`;
}

function doLogout(){
  localStorage.removeItem('ls_session');
  currentUser=null;
  location.reload();
}

// ===== SHIFTS CRUD =====
function openAddShift(){
  document.getElementById('f-date').value=today();
  // Auto-set studio from user's last shift
  const myLast=shifts.filter(s=>s.admin===currentUser.name).sort((a,b)=>b.date.localeCompare(a.date));
  if(myLast.length)document.getElementById('f-studio').value=myLast[0].studio;
  ['f-new','f-renew','f-restore','f-leads','f-bookings','f-visits','f-massage','f-reviews','f-calls','f-tasks','f-yoga','f-mc'].forEach(id=>document.getElementById(id).value='0');
  document.getElementById('add-certs').innerHTML='';
  document.getElementById('add-error').style.display='none';
  addCertN=0;
  document.getElementById('add-modal').style.display='flex';
}

async function saveShift(){
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Сохранение...';
  const {error}=await sb.from('shifts').insert({
    date:document.getElementById('f-date').value,
    studio:document.getElementById('f-studio').value,
    admin:currentUser.name,
    new_sales:+document.getElementById('f-new').value||0,
    renew:+document.getElementById('f-renew').value||0,
    restore:+document.getElementById('f-restore').value||0,
    leads:+document.getElementById('f-leads').value||0,
    bookings:+document.getElementById('f-bookings').value||0,
    visits:+document.getElementById('f-visits').value||0,
    massage_bookings:+document.getElementById('f-massage').value||0,
    reviews:+document.getElementById('f-reviews').value||0,
    calls:+document.getElementById('f-calls').value||0,
    tasks:+document.getElementById('f-tasks').value||0,
    yoga_bookings:+document.getElementById('f-yoga').value||0,
    masterclass_bookings:+document.getElementById('f-mc').value||0,
    certs:[]
  });
  btn.disabled=false;btn.innerHTML='✓ Сохранить';
  if(error){showErr('add-error','Ошибка: '+error.message);return;}
  closeModal('add-modal');await loadData();
}

function openEdit(id){
  const s=shifts.find(x=>x.id===id);if(!s||s.admin!==currentUser.name)return;
  editingId=id;
  document.getElementById('e-date').value=s.date;
  document.getElementById('e-studio').value=s.studio;
  document.getElementById('e-new').value=s.newSales||0;
  document.getElementById('e-renew').value=s.renew||0;
  document.getElementById('e-restore').value=s.restore||0;
  document.getElementById('e-leads').value=s.leads||0;
  document.getElementById('e-bookings').value=s.bookings||0;
  document.getElementById('e-visits').value=s.visits||0;
  document.getElementById('e-massage').value=s.massage||0;
  document.getElementById('e-reviews').value=s.reviews||0;
  document.getElementById('e-calls').value=s.calls||0;
  document.getElementById('e-tasks').value=s.tasks||0;
  document.getElementById('e-yoga').value=s.yoga||0;
  document.getElementById('e-mc').value=s.mc||0;

  document.getElementById('edit-error').style.display='none';
  document.getElementById('edit-modal').style.display='flex';
}

async function updateShift(){
  const btn=document.getElementById('update-btn');btn.disabled=true;btn.textContent='Сохранение...';
  const {error}=await sb.from('shifts').update({
    date:document.getElementById('e-date').value,
    studio:document.getElementById('e-studio').value,
    new_sales:+document.getElementById('e-new').value||0,
    renew:+document.getElementById('e-renew').value||0,
    restore:+document.getElementById('e-restore').value||0,
    leads:+document.getElementById('e-leads').value||0,
    bookings:+document.getElementById('e-bookings').value||0,
    visits:+document.getElementById('e-visits').value||0,
    massage_bookings:+document.getElementById('e-massage').value||0,
    reviews:+document.getElementById('e-reviews').value||0,
    calls:+document.getElementById('e-calls').value||0,
    tasks:+document.getElementById('e-tasks').value||0,
    yoga_bookings:+document.getElementById('e-yoga').value||0,
    masterclass_bookings:+document.getElementById('e-mc').value||0,
    certs:[]
  }).eq('id',editingId);
  btn.disabled=false;btn.innerHTML='✓ Сохранить';
  if(error){showErr('edit-error','Ошибка: '+error.message);return;}
  closeModal('edit-modal');await loadData();
}

async function deleteShift(){
  if(!confirm('Удалить эту смену?'))return;
  await sb.from('shifts').delete().eq('id',editingId);
  closeModal('edit-modal');await loadData();
}

function addCert(mode){
  const cont=document.getElementById(mode==='add'?'add-certs':'edit-certs');
  const n=mode==='add'?addCertN++:editCertN++;
  const div=document.createElement('div');
  div.className='cert-block';div.id=`cert-${mode}-${n}`;
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-weight:600;color:var(--text2)">🎫 Сертификат ${n+1}</span><button class="btn btn-sm btn-danger" onclick="this.closest('.cert-block').remove()">✕</button></div><div class="grid2"><div class="form-row"><label>Кто дал</label><input type="text" data-f="giver" placeholder="Имя клиента"></div><div class="form-row"><label>Кто пришёл</label><input type="text" data-f="visitor" placeholder="Имя"></div></div><div class="grid2"><div class="form-row"><label>Пришёл?</label><select data-f="came" onchange="toggleCame(this,'${mode}-${n}')"><option value="0">Нет</option><option value="1">Да</option></select></div><div class="form-row" id="bought-wrap-${mode}-${n}" style="display:none"><label>Купил?</label><select data-f="bought" onchange="toggleBought(this,'${mode}-${n}')"><option value="0">Нет</option><option value="1">Да</option></select></div></div><div class="form-row" id="amount-wrap-${mode}-${n}" style="display:none"><label>Сумма, ₽</label><input type="number" data-f="amount" value="0" min="0"></div>`;
  cont.appendChild(div);
}
function toggleCame(sel,id){document.getElementById('bought-wrap-'+id).style.display=sel.value==='1'?'block':'none';document.getElementById('amount-wrap-'+id).style.display='none';}
function toggleBought(sel,id){document.getElementById('amount-wrap-'+id).style.display=sel.value==='1'?'block':'none';}
function getCerts(contId){
  return[...document.getElementById(contId).querySelectorAll('.cert-block')].map(b=>({
    giver:b.querySelector('[data-f="giver"]').value.trim(),
    visitor:b.querySelector('[data-f="visitor"]').value.trim(),
    came:b.querySelector('[data-f="came"]').value==='1',
    bought:b.querySelector('[data-f="bought"]')?.value==='1'||false,
    amount:+b.querySelector('[data-f="amount"]')?.value||0
  }));
}

function closeModal(id){document.getElementById(id).style.display='none';}
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['dashboard','shifts','profile'][i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='profile')renderProfile();
}

  buildPinPad('login-pad','login');
  buildPinPad('reg-pad','reg');

  document.getElementById('reg-submit-btn').addEventListener('click',doRegister);
});
checkSession();
</script>
