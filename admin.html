<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Управленческая панель — Lady Stretch</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --text:#1a1a2e;--text2:#555570;--text3:#888899;
  --border:#e0e0eb;--border2:#c8c8d8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-text:#6d28d9;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg3);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
.app{max-width:960px;margin:0 auto;padding:1rem}
.topbar{background:var(--purple);color:#fff;padding:14px 20px;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;font-family:inherit;white-space:nowrap;text-align:center}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
.tab.active{background:var(--purple);color:#fff}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-muted{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:.75rem 1rem;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
.metric-val{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.progress-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s ease}
.progress-wrap-sm{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill-sm{height:100%;border-radius:3px}
label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;line-height:1.3}
input,select,textarea{width:100%;padding:8px 12px;font-size:16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;min-height:70px}
.form-row{margin-bottom:10px}
.btn{padding:9px 18px;font-size:14px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:#6d28d9}
.btn-danger{color:var(--red-text);border-color:#fca5a5}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.pill-imp{background:#eff6ff;color:#1d4ed8;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.pill-mec{background:#f5f3ff;color:#6d28d9;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.kpi-table{width:100%;border-collapse:collapse;font-size:13px}
.kpi-table th{background:var(--bg2);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border)}
.kpi-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.kpi-table tr:last-child td{border-bottom:none}
.delta-pos{color:var(--green-text);font-weight:600}
.delta-neg{color:var(--red-text);font-weight:600}
.delta-neu{color:var(--text3)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:min(500px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:17px;font-weight:700}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px}
.alert-green{background:var(--green-bg);color:var(--green-text);border:1px solid #86efac}
.alert-red{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5}
.pin-input{text-align:center;font-size:28px;letter-spacing:10px;font-weight:700}
.funnel-stage{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:2px}
.funnel-label{flex:1;font-size:13px;color:var(--text2)}
.funnel-arrow{text-align:center;color:var(--text3);font-size:13px;padding:2px 0}
.cv-good{color:var(--green-text);font-weight:600}
.cv-mid{color:var(--amber-text);font-weight:600}
.cv-bad{color:var(--red-text);font-weight:600}
/* Marathon */
.marathon-card{border:2px solid var(--amber);border-radius:var(--radius);padding:1rem;margin-bottom:12px;background:var(--amber-bg)}
.marathon-card.inactive{border-color:var(--border);background:var(--bg2);opacity:.7}
.marathon-title{font-size:15px;font-weight:700;color:var(--amber-text);margin-bottom:4px}
.marathon-card.inactive .marathon-title{color:var(--text2)}
.marathon-prize{font-size:22px;font-weight:800;color:var(--amber-text)}
.marathon-card.inactive .marathon-prize{color:var(--text3)}
/* MoM */
/* mom styles removed - using inline */
/* Admin progress row */
.admin-progress-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-progress-row:last-child{border-bottom:none}
.admin-progress-name{font-weight:500;margin-bottom:4px;font-size:13px}
.admin-progress-bar{width:100%;margin:4px 0}
.admin-progress-val{font-size:12px;color:var(--text2);margin-top:2px}
.admin-done{color:var(--green-text);font-weight:700}
</style>
</head>

  <div id="tab-motivation" class="section"><div id="motivation-content"></div></div>
</div>
</div>

function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')}
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(){return today().slice(0,7)}
function prevMonthKey(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function monthLabel(){return new Date().toLocaleString('ru-RU',{month:'long',year:'numeric'})}
function prevMonthLabel(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toLocaleString('ru-RU',{month:'long',year:'numeric'});}

function calcRR(fact){
  const now=new Date();
  const day=now.getDate();
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return day>0?Math.round(fact/day*dim):0;
}

function checkPin(){
  const v=document.getElementById('pin-field').value;

async function init(){
  document.getElementById('month-label').textContent=monthLabel();
  await loadData();

async function loadData(){
  document.getElementById('sync-label').textContent='загрузка...';
  const m=monthKey(),pm=prevMonthKey();
  const [{data:cur},{data:prev},{data:mar}]=await Promise.all([
    sb.from('shifts').select('*').gte('date',m+'-01').lte('date',m+'-31'),
    sb.from('shifts').select('*').gte('date',pm+'-01').lte('date',pm+'-31'),
    sb.from('marathons').select('*').order('created_at',{ascending:false})
  ]);
  const parse=r=>({
    id:r.id,date:r.date,studio:r.studio,admin:r.admin,
    newSales:+r.new_sales||0,renew:+r.renew||0,restore:+r.restore||0,
    certs:r.certs||[],leads:+r.leads||0,bookings:+r.bookings||0,visits:+r.visits||0,
    massage:+r.massage_bookings||0,reviews:+r.reviews||0
  });
  shifts=(cur||[]).map(parse);
  shiftsLast=(prev||[]).map(parse);
  marathons=mar||[];
  // Load plans from Supabase
  const {data:plansData}=await sb.from('plans').select('*');
  plans={};
  (plansData||[]).forEach(p=>{
    plans[p.month+'_'+p.studio]={
      revenue:p.revenue||0,new_clients:p.new_clients||0,
      leads:p.leads||0,bookings:p.bookings||0,visits:p.visits||0,
      renewals:p.renewals||0,cv1:p.cv1||0,cv2:p.cv2||0,cv3:p.cv3||0
    };
  });
  document.getElementById('sync-label').textContent='обновлено ✓';
  renderAll();
}

function getStats(ss){
  const revenue=ss.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  const leads=ss.reduce((a,s)=>a+s.leads,0);
  const bookings=ss.reduce((a,s)=>a+s.bookings,0);
  const visits=ss.reduce((a,s)=>a+s.visits,0);
  const newSalesCount=ss.filter(s=>s.newSales>0).length;
  const renewals=ss.filter(s=>s.renew>0).length;
  const massage=ss.reduce((a,s)=>a+s.massage,0);
  const reviews=ss.reduce((a,s)=>a+s.reviews,0);
  const calls=ss.reduce((a,s)=>a+s.calls,0);
  const tasks=ss.reduce((a,s)=>a+s.tasks,0);
  const yoga=ss.reduce((a,s)=>a+s.yoga,0);
  const mc=ss.reduce((a,s)=>a+s.mc,0);
  const rr=calcRR(revenue);
  const cv1=leads>0?Math.round(bookings/leads*100):null;
  const cv2=bookings>0?Math.round(visits/bookings*100):null;
  const cv3=visits>0?Math.round(newSalesCount/visits*100):null;
  return{revenue,leads,bookings,visits,newSalesCount,renewals,massage,reviews,calls,tasks,yoga,mc,rr,cv1,cv2,cv3,n:ss.length};
}

function getPlan(st){return plans[monthKey()+'_'+st]||{};}

function badge(p){
  if(p===null||p===undefined)return'<span class="badge" style="background:var(--bg2);color:var(--text3)">нет данных</span>';
  if(p>=100)return`<span class="badge badge-green">✓ В плане</span>`;
  if(p>=85)return`<span class="badge badge-amber">⚠ Ускориться</span>`;
  return`<span class="badge badge-red">✗ Отстаём</span>`;
}

function delta(cur,prev){
  if(!prev)return'';
  const d=Math.round((cur-prev)/prev*100);
  if(d>0)return`<span class="delta-pos">▲ ${d}%</span>`;
  if(d<0)return`<span class="delta-neg">▼ ${Math.abs(d)}%</span>`;
  return`<span class="delta-neu">= 0%</span>`;
}

const CONDITION_LABELS={
  revenue:'Выручка',new_sales:'Новых продаж',renewals:'Продлений',
  bookings:'Записей на пробное',visits:'Доходимость',
  massage:'Записей на массаж',reviews:'Отзывов',conv_cv3:'CV приход→продажа'
};
const CONDITION_UNITS={
  revenue:' ₽',new_sales:' шт',renewals:' шт',bookings:' шт',
  visits:' чел',massage:' шт',reviews:' шт',conv_cv3:'%'
};

function conditionLabel(type,val){
  return`${CONDITION_LABELS[type]||type} ≥ ${type==='revenue'?fmt(val):val}${CONDITION_UNITS[type]||''}`;
}

function updateConditionLabel(){
  const type=document.getElementById('m-condition-type').value;
  document.getElementById('m-condition-label').textContent='Порог (≥), '+
    (type==='revenue'?'₽':type==='conv_cv3'?'%':'шт/чел');
}

function marathonProgress(m,ss){
  const msShifts=ss.filter(s=>s.date>=m.date_start&&s.date<=m.date_end);
  const type=m.condition_type;
  let val=0;
  if(type==='revenue') val=msShifts.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  else if(type==='new_sales') val=msShifts.filter(s=>s.newSales>0).length;
  else if(type==='renewals') val=msShifts.filter(s=>s.renew>0).length;
  else if(type==='bookings') val=msShifts.reduce((a,s)=>a+s.bookings,0);
  else if(type==='visits') val=msShifts.reduce((a,s)=>a+s.visits,0);
  else if(type==='massage') val=msShifts.reduce((a,s)=>a+s.massage,0);
  else if(type==='reviews') val=msShifts.reduce((a,s)=>a+s.reviews,0);
  else if(type==='conv_cv3'){
    const v=msShifts.reduce((a,s)=>a+s.visits,0);
    const sv=msShifts.filter(s=>s.newSales>0).length;
    val=v>0?Math.round(sv/v*100):0;
  }
  const target=+m.condition_value||1;
  const pct=Math.min(Math.round(val/target*100),100);
  return{val,target,pct,done:val>=target};
}

function funnelHtml(fact,plan){
  const stages=[
    {label:'Лиды',fact:fact.leads,plan:plan.leads||0},
    {label:'Записи',fact:fact.bookings,plan:plan.bookings||0,cv:fact.cv1,cvPlan:plan.cv1||0},
    {label:'Доходимость',fact:fact.visits,plan:plan.visits||0,cv:fact.cv2,cvPlan:plan.cv2||0},
    {label:'Новые продажи',fact:fact.newSalesCount,plan:plan.new_clients||0,cv:fact.cv3,cvPlan:plan.cv3||0},
  ];
  return`<div>${stages.map((s,i)=>`
    ${i>0?`<div class="funnel-arrow">↓ ${s.cv!==null?`<span class="${s.cv>=(s.cvPlan||0)?'cv-good':s.cv>=(s.cvPlan||0)*0.85?'cv-mid':'cv-bad'}">${s.cv}%${s.cvPlan?' (план '+s.cvPlan+'%)':''}</span>`:'нет данных'}</div>`:''}
    <div class="funnel-stage"><span class="funnel-label">${s.label}</span><span style="font-weight:700">${s.fact}</span>${s.plan?`<span style="font-size:11px;color:var(--text3);margin-left:8px">план ${s.plan}</span>`:''}</div>`).join('')}</div>`;
}

      html+=`<div class="marathon-card inactive">

async function resetPin(id, name){
  const newPin=prompt(`Введите новый пин-код для ${name} (4 цифры):`);
  if(!newPin||newPin.length!==4||!/^\d{4}$/.test(newPin)){alert('Пин должен быть 4 цифры');return;}
  const hash=simpleHash(name+newPin);
  await sb.from('profiles').update({password_hash:hash}).eq('id',id);
  alert(`✓ Пин-код для ${name} сброшен. Новый пин: ${newPin}`);
}

function simpleHash(str){
  let h=0;for(let i=0;i<str.length;i++){h=Math.imul(31,h)+str.charCodeAt(i)|0;}return Math.abs(h).toString(36);
}

function calcShift(s){
  const cash=(+s.newSales||0)+(+s.renew||0)+(+s.restore||0);
  const fix=1500,pNew=Math.round((+s.newSales||0)*0.05),pRenew=Math.round((+s.renew||0)*0.08),pRestore=Math.round((+s.restore||0)*0.10);
  const bonus=cashBonus(s.studio,cash);
  return{fix,pNew,pRenew,pRestore,bonus,cash,total:fix+pNew+pRenew+pRestore+bonus};
}
function cashBonus(studio,cash){
  if(studio==='Империал'){if(cash>=100000)return 2500;if(cash>=80000)return 1500;if(cash>=60000)return 1000;return 0;}
  else{if(cash>=70000)return 2500;if(cash>=55000)return 1500;if(cash>=40000)return 1000;return 0;}
}

  if(!from||!to){return;}
  
  const btn=document.getElementById('sal-load-btn');
  btn.disabled=true;btn.textContent='Загрузка...';
  
  const {data:sd}=await sb.from('shifts').select('*').gte('date',from).lte('date',to);
  
  btn.disabled=false;btn.textContent='Загрузить';
  
  const periodShifts=(sd||[]).map(r=>({
    id:r.id,date:r.date,studio:r.studio,admin:r.admin,
    newSales:+r.new_sales||0,renew:+r.renew||0,restore:+r.restore||0,
    leads:+r.leads||0,bookings:+r.bookings||0,visits:+r.visits||0,
    massage:+r.massage_bookings||0,reviews:+r.reviews||0,
    calls:+r.calls||0,tasks:+r.tasks||0,yoga:+r.yoga_bookings||0,mc:+r.masterclass_bookings||0
  }));
  
  const admins=[...new Set(periodShifts.map(s=>s.admin))].filter(Boolean).sort();
  
  if(!admins.length){
    document.getElementById('sal-result').innerHTML='<div style="color:var(--text3);text-align:center;padding:2rem">Нет данных за выбранный период</div>';
    return;
  }
  
  const adminData=admins.map(admin=>{
    const ss=periodShifts.filter(s=>s.admin===admin);
    const studio=ss[0]?.studio||'—';
    const n=ss.length;
    const revenue=ss.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
    let fix=0,pNew=0,pRenew=0,pRestore=0,bonus=0;
    ss.forEach(s=>{
      const sal=calcShift(s);
      fix+=sal.fix;pNew+=sal.pNew;pRenew+=sal.pRenew;pRestore+=sal.pRestore;bonus+=sal.bonus;
    });
    const total=fix+pNew+pRenew+pRestore+bonus;
    return{admin,studio,n,revenue,fix,pNew,pRenew,pRestore,bonus,total};
  }).sort((a,b)=>b.total-a.total);
  
  const grandTotal=adminData.reduce((a,d)=>a+d.total,0);
  
  let html=`
    <div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,var(--purple-bg),#f0f4ff);border-color:#c4b5fd">
      <div style="font-size:12px;color:var(--purple-text);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Итого к выплате за период ${from} — ${to}</div>
      <div style="font-size:32px;font-weight:800;color:var(--purple-text)">${fmt(grandTotal)} ₽</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">${admins.length} сотрудников · ${periodShifts.length} смен</div>
    </div>`;
  
  // Cards per admin
  adminData.forEach(d=>{
    const pill=d.studio==='Империал'?'pill-imp':'pill-mec';
    html+=`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:16px;font-weight:700">${d.admin}</div>
          <span class="${pill}">${d.studio}</span>
          <span style="font-size:12px;color:var(--text3);margin-left:8px">${d.n} смен</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:800;color:var(--purple-text)">${fmt(d.total)} ₽</div>
          <div style="font-size:11px;color:var(--text3)">выручка: ${fmt(d.revenue)} ₽</div>
        </div>
      </div>
      <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:.75rem">
        ${[
          {label:`Оклад (${d.n} × 1 500 ₽)`,val:d.fix},
          {label:'Новые абонементы (5%)',val:d.pNew},
          {label:'Продления (8%)',val:d.pRenew},
          {label:'Восстановление (10%)',val:d.pRestore},
          {label:'Бонус за кассу',val:d.bonus},
        ].filter(i=>i.val>0).map(i=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px">
            <span style="color:var(--text2)">${i.label}</span>
            <span style="font-weight:600">${fmt(i.val)} ₽</span>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:14px;font-weight:700">
          <span>Итого</span><span style="color:var(--purple-text)">${fmt(d.total)} ₽</span>
        </div>
      </div>
    </div>`;
  });
  
  document.getElementById('sal-result').innerHTML=html;
}

let motivationSchemes = [];

async function renderMotivation(){
  const el = document.getElementById('motivation-content');
  el.innerHTML = '<div style="color:var(--text3);text-align:center;padding:2rem">Загрузка...</div>';
  
  const {data} = await sb.from('motivation_schemes').select('*').order('effective_from', {ascending:false});
  motivationSchemes = data || [];
  
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin:0">История схем мотивации</div>
      <button class="btn btn-primary btn-sm" onclick="openNewMotivation()">+ Новая схема</button>
    </div>`;

  if(!motivationSchemes.length){
    html += '<div class="card-muted" style="text-align:center;color:var(--text3)">Схем ещё нет</div>';
  } else {
    motivationSchemes.forEach((s,i) => {
      const isActive = i === 0;
      html += `<div class="card" style="${isActive?'border-color:var(--green)':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div style="font-size:15px;font-weight:700">С ${s.effective_from}</div>
            ${isActive?'<span class="badge badge-green" style="margin-top:4px">Действует сейчас</span>':''}
          </div>
          <button class="btn btn-sm" onclick="openEditMotivation(${s.id})">✏️ Изменить</button>
        </div>
        <div class="grid3">
          <div class="metric"><div class="metric-label">Оклад/смена</div><div class="metric-val" style="font-size:16px">${fmt(s.fix_per_shift)} ₽</div></div>
          <div class="metric"><div class="metric-label">Новые</div><div class="metric-val" style="font-size:16px">${s.pct_new}%</div></div>
          <div class="metric"><div class="metric-label">Продления</div><div class="metric-val" style="font-size:16px">${s.pct_renew}%</div></div>
        </div>
        <div class="grid3" style="margin-top:8px">
          <div class="metric"><div class="metric-label">Возврат</div><div class="metric-val" style="font-size:16px">${s.pct_restore}%</div></div>
          <div class="metric" style="grid-column:span 2">
            <div class="metric-label">Бонус Империал</div>
            <div style="font-size:12px;color:var(--text2);margin-top:4px">
              ${fmt(s.imp_bonus_1_threshold)} → +${fmt(s.imp_bonus_1_amount)} ₽<br>
              ${fmt(s.imp_bonus_2_threshold)} → +${fmt(s.imp_bonus_2_amount)} ₽<br>
              ${fmt(s.imp_bonus_3_threshold)} → +${fmt(s.imp_bonus_3_amount)} ₽
            </div>
          </div>
        </div>
        <div class="metric" style="margin-top:8px">
          <div class="metric-label">Бонус Мечта</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap">
            <span>${fmt(s.mec_bonus_1_threshold)} → +${fmt(s.mec_bonus_1_amount)} ₽</span>
            <span>${fmt(s.mec_bonus_2_threshold)} → +${fmt(s.mec_bonus_2_amount)} ₽</span>
            <span>${fmt(s.mec_bonus_3_threshold)} → +${fmt(s.mec_bonus_3_amount)} ₽</span>
          </div>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function motivationFormHTML(s){
  s = s || {};
  return `
    <div class="form-row"><label>Действует с</label><input type="date" id="mot-from" value="${s.effective_from||today()}"></div>
    <div class="divider"></div>
    <div class="subsection-title">Оклад и проценты</div>
    <div class="grid3">
      <div class="form-row"><label>Оклад/смена, ₽</label><input type="number" id="mot-fix" value="${s.fix_per_shift||1500}" min="0"></div>
      <div class="form-row"><label>Новые, %</label><input type="number" id="mot-new" value="${s.pct_new||5}" min="0" step="0.1"></div>
      <div class="form-row"><label>Продления, %</label><input type="number" id="mot-renew" value="${s.pct_renew||8}" min="0" step="0.1"></div>
    </div>
    <div class="form-row"><label>Возврат клиентов, %</label><input type="number" id="mot-restore" value="${s.pct_restore||10}" min="0" step="0.1"></div>
    <div class="divider"></div>
    <div class="subsection-title">Бонус за кассу — Империал</div>
    <div class="grid2">
      <div class="form-row"><label>Порог 1, ₽</label><input type="number" id="mot-i1t" value="${s.imp_bonus_1_threshold||60000}" min="0"></div>
      <div class="form-row"><label>Бонус 1, ₽</label><input type="number" id="mot-i1a" value="${s.imp_bonus_1_amount||1000}" min="0"></div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Порог 2, ₽</label><input type="number" id="mot-i2t" value="${s.imp_bonus_2_threshold||80000}" min="0"></div>
      <div class="form-row"><label>Бонус 2, ₽</label><input type="number" id="mot-i2a" value="${s.imp_bonus_2_amount||1500}" min="0"></div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Порог 3, ₽</label><input type="number" id="mot-i3t" value="${s.imp_bonus_3_threshold||100000}" min="0"></div>
      <div class="form-row"><label>Бонус 3, ₽</label><input type="number" id="mot-i3a" value="${s.imp_bonus_3_amount||2500}" min="0"></div>
    </div>
    <div class="divider"></div>
    <div class="subsection-title">Бонус за кассу — Мечта</div>
    <div class="grid2">
      <div class="form-row"><label>Порог 1, ₽</label><input type="number" id="mot-m1t" value="${s.mec_bonus_1_threshold||40000}" min="0"></div>
      <div class="form-row"><label>Бонус 1, ₽</label><input type="number" id="mot-m1a" value="${s.mec_bonus_1_amount||1000}" min="0"></div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Порог 2, ₽</label><input type="number" id="mot-m2t" value="${s.mec_bonus_2_threshold||55000}" min="0"></div>
      <div class="form-row"><label>Бонус 2, ₽</label><input type="number" id="mot-m2a" value="${s.mec_bonus_2_amount||1500}" min="0"></div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Порог 3, ₽</label><input type="number" id="mot-m3t" value="${s.mec_bonus_3_threshold||70000}" min="0"></div>
      <div class="form-row"><label>Бонус 3, ₽</label><input type="number" id="mot-m3a" value="${s.mec_bonus_3_amount||2500}" min="0"></div>
    </div>`;
}

function openNewMotivation(){
  document.getElementById('mot-modal-title').textContent='+ Новая схема мотивации';
  document.getElementById('mot-form').innerHTML=motivationFormHTML();
  document.getElementById('mot-save-btn').onclick=saveNewMotivation;
  document.getElementById('motivation-modal').style.display='flex';
}

function openEditMotivation(id){
  const s=motivationSchemes.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('mot-modal-title').textContent='✏️ Редактировать схему';
  document.getElementById('mot-form').innerHTML=motivationFormHTML(s);
  document.getElementById('mot-save-btn').onclick=()=>updateMotivation(id);
  document.getElementById('motivation-modal').style.display='flex';
}

function getMotivationFormData(){
  return{
    effective_from:document.getElementById('mot-from').value,
    fix_per_shift:+document.getElementById('mot-fix').value||1500,
    pct_new:+document.getElementById('mot-new').value||5,
    pct_renew:+document.getElementById('mot-renew').value||8,
    pct_restore:+document.getElementById('mot-restore').value||10,
    imp_bonus_1_threshold:+document.getElementById('mot-i1t').value||60000,
    imp_bonus_1_amount:+document.getElementById('mot-i1a').value||1000,
    imp_bonus_2_threshold:+document.getElementById('mot-i2t').value||80000,
    imp_bonus_2_amount:+document.getElementById('mot-i2a').value||1500,
    imp_bonus_3_threshold:+document.getElementById('mot-i3t').value||100000,
    imp_bonus_3_amount:+document.getElementById('mot-i3a').value||2500,
    mec_bonus_1_threshold:+document.getElementById('mot-m1t').value||40000,
    mec_bonus_1_amount:+document.getElementById('mot-m1a').value||1000,
    mec_bonus_2_threshold:+document.getElementById('mot-m2t').value||55000,
    mec_bonus_2_amount:+document.getElementById('mot-m2a').value||1500,
    mec_bonus_3_threshold:+document.getElementById('mot-m3t').value||70000,
    mec_bonus_3_amount:+document.getElementById('mot-m3a').value||2500,
  };
}

async function saveNewMotivation(){
  const row=getMotivationFormData();
  if(!row.effective_from){alert('Укажите дату');return;}
  const {error}=await sb.from('motivation_schemes').insert(row);
  if(error){alert('Ошибка: '+error.message);return;}
  closeModal('motivation-modal');
  renderMotivation();
}

async function updateMotivation(id){
  const row=getMotivationFormData();
  const {error}=await sb.from('motivation_schemes').update(row).eq('id',id);
  if(error){alert('Ошибка: '+error.message);return;}
  closeModal('motivation-modal');
  renderMotivation();
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['overview','mom','studios','admins','marathons','reports','staff','plans','salary','motivation'][i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='reports')renderReports();
  if(t==='staff')renderStaff();
  if(t==='salary')renderSalary();
  if(t==='motivation')renderMotivation();
}

document.getElementById('pin-field').focus();
</script>
</body>
</html>
