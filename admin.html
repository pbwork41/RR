<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управленческая панель — Lady Stretch</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --text:#1a1a2e;--text2:#555570;--text3:#888899;
  --border:#e0e0eb;--border2:#c8c8d8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-text:#6d28d9;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg3);color:var(--text);font-size:15px;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1rem}
.topbar{background:var(--purple);color:#fff;padding:14px 20px;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;font-family:inherit;white-space:nowrap;text-align:center}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
.tab.active{background:var(--purple);color:#fff}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-muted{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:.75rem 1rem;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
.metric-val{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.progress-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s ease}
.progress-wrap-sm{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill-sm{height:100%;border-radius:3px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:8px 12px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;min-height:70px}
.form-row{margin-bottom:10px}
.btn{padding:9px 18px;font-size:14px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:#6d28d9}
.btn-danger{color:var(--red-text);border-color:#fca5a5}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.section-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.pill-imp{background:#eff6ff;color:#1d4ed8;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.pill-mec{background:#f5f3ff;color:#6d28d9;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.kpi-table{width:100%;border-collapse:collapse;font-size:13px}
.kpi-table th{background:var(--bg2);padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border)}
.kpi-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.kpi-table tr:last-child td{border-bottom:none}
.delta-pos{color:var(--green-text);font-weight:600}
.delta-neg{color:var(--red-text);font-weight:600}
.delta-neu{color:var(--text3)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:min(500px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:17px;font-weight:700}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px}
.alert-green{background:var(--green-bg);color:var(--green-text);border:1px solid #86efac}
.alert-red{background:var(--red-bg);color:var(--red-text);border:1px solid #fca5a5}
.pin-input{text-align:center;font-size:28px;letter-spacing:10px;font-weight:700}
.funnel-stage{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:2px}
.funnel-label{flex:1;font-size:13px;color:var(--text2)}
.funnel-arrow{text-align:center;color:var(--text3);font-size:13px;padding:2px 0}
.cv-good{color:var(--green-text);font-weight:600}
.cv-mid{color:var(--amber-text);font-weight:600}
.cv-bad{color:var(--red-text);font-weight:600}
/* Marathon */
.marathon-card{border:2px solid var(--amber);border-radius:var(--radius);padding:1rem;margin-bottom:12px;background:var(--amber-bg)}
.marathon-card.inactive{border-color:var(--border);background:var(--bg2);opacity:.7}
.marathon-title{font-size:15px;font-weight:700;color:var(--amber-text);margin-bottom:4px}
.marathon-card.inactive .marathon-title{color:var(--text2)}
.marathon-prize{font-size:22px;font-weight:800;color:var(--amber-text)}
.marathon-card.inactive .marathon-prize{color:var(--text3)}
/* MoM */
/* mom styles removed - using inline */
/* Admin progress row */
.admin-progress-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-progress-row:last-child{border-bottom:none}
.admin-progress-name{font-weight:500;margin-bottom:4px;font-size:13px}
.admin-progress-bar{width:100%;margin:4px 0}
.admin-progress-val{font-size:12px;color:var(--text2);margin-top:2px}
.admin-done{color:var(--green-text);font-weight:700}
</style>
</head>
<body>

<div id="pin-screen" style="position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:999">
  <div class="card" style="width:min(360px,90vw);text-align:center;padding:2rem">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px">Управленческая панель</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:24px">Lady Stretch · Только для руководителей</div>
    <input type="password" class="pin-input" id="pin-field" maxlength="4" placeholder="••••" oninput="checkPin()">
    <div id="pin-err" class="alert alert-red" style="display:none;margin-top:8px">Неверный пин-код</div>
  </div>
</div>

<div id="main-app" style="display:none">
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">👑 Управленческая панель</div>
      <div class="topbar-sub" id="month-label"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;opacity:.8" id="sync-label">загрузка...</span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="openPlanModal()">✏️ План</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="openMarathonModal()">🏆 Марафон</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">📊 Сводка</button>

    <button class="tab" onclick="switchTab('studios')">🏢 Студии</button>

    <button class="tab" onclick="switchTab('marathons')">🏆 Марафоны</button>
    <button class="tab" onclick="switchTab('plans')">🎯 Планы</button>

  <div id="tab-overview" class="section active"><div id="overview-content"></div></div>
  <div id="tab-mom" class="section"><div id="mom-content"></div></div>
  <div id="tab-studios" class="section"><div id="studios-content"></div></div>
  <div id="tab-admins" class="section"><div id="admins-content"></div></div>
  <div id="tab-marathons" class="section"><div id="marathons-content"></div></div>
  <div id="tab-plans" class="section"><div id="plans-content"></div></div>
</div>
</div>

  <div class="grid2">

  <div class="grid2">
    <div class="form-row"><label>Выручка, ₽</label><input type="number" id="mec-revenue"></div>
    <div class="form-row"><label>Новые абонементы, шт</label><input type="number" id="mec-new"></div>

  <div class="grid2">
    <div class="form-row"><label>Лиды, шт</label><input type="number" id="mec-leads"></div>

<!-- MARATHON MODAL -->
<div id="marathon-modal" style="display:none" class="modal-bg">
<div class="modal">
  <div class="modal-header"><div class="modal-title">🏆 Создать марафон</div><button class="btn btn-sm" onclick="closeModal('marathon-modal')">✕</button></div>
  <div class="form-row"><label>Название</label><input type="text" id="m-title" placeholder="Марафон продлений"></div>

    <select id="m-condition-type" onchange="updateConditionLabel()">
      <option value="revenue">Выручка, ₽</option>

  <div class="divider"></div>
  <div id="marathon-msg" style="display:none" class="alert alert-green">✓ Марафон создан</div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" onclick="closeModal('marathon-modal')">Отмена</button>
    <button class="btn btn-primary" onclick="saveMarathon()">🏆 Запустить</button>
  </div>
</div>
</div>

<script>
const PIN='8387';
const SUPABASE_URL='https://nhiyoilfegmmvdtqsgkm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oaXlvaWxmZWdtbXZkdHFzZ2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDc0MTMsImV4cCI6MjA5NjE4MzQxM30.VL7a64jalOvhGC3yLMdeR-qR1Jlffht-uYcYmwDn7oQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let shifts=[],shiftsLast=[],marathons=[],plans={};

function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')}
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(){return today().slice(0,7)}
function prevMonthKey(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function monthLabel(){return new Date().toLocaleString('ru-RU',{month:'long',year:'numeric'})}
function prevMonthLabel(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toLocaleString('ru-RU',{month:'long',year:'numeric'});}

function calcRR(fact){
  const now=new Date();
  const day=now.getDate();
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return day>0?Math.round(fact/day*dim):0;
}

function checkPin(){
  const v=document.getElementById('pin-field').value;
  if(v.length<4)return;
  if(v===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('main-app').style.display='block';init();}
  else{document.getElementById('pin-err').style.display='block';document.getElementById('pin-field').value='';}
}

async function init(){
  document.getElementById('month-label').textContent=monthLabel();
  await loadData();
}

async function loadData(){
  document.getElementById('sync-label').textContent='загрузка...';
  const m=monthKey(),pm=prevMonthKey();
  const [{data:cur},{data:prev},{data:mar}]=await Promise.all([
    sb.from('shifts').select('*').gte('date',m+'-01').lte('date',m+'-31'),
    sb.from('shifts').select('*').gte('date',pm+'-01').lte('date',pm+'-31'),
    sb.from('marathons').select('*').order('created_at',{ascending:false})
  ]);
  const parse=r=>({
    id:r.id,date:r.date,studio:r.studio,admin:r.admin,
    newSales:+r.new_sales||0,renew:+r.renew||0,restore:+r.restore||0,
    certs:r.certs||[],leads:+r.leads||0,bookings:+r.bookings||0,visits:+r.visits||0,
    massage:+r.massage_bookings||0,reviews:+r.reviews||0
  });
  shifts=(cur||[]).map(parse);
  shiftsLast=(prev||[]).map(parse);
  marathons=mar||[];
  try{plans=JSON.parse(localStorage.getItem('ls_plans_v2')||'{}');}catch(e){plans={};}
  document.getElementById('sync-label').textContent='обновлено ✓';
  renderAll();
}

function getStats(ss){
  const revenue=ss.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  const leads=ss.reduce((a,s)=>a+s.leads,0);
  const bookings=ss.reduce((a,s)=>a+s.bookings,0);
  const visits=ss.reduce((a,s)=>a+s.visits,0);
  const newSalesCount=ss.filter(s=>s.newSales>0).length;
  const renewals=ss.filter(s=>s.renew>0).length;
  const massage=ss.reduce((a,s)=>a+s.massage,0);
  const reviews=ss.reduce((a,s)=>a+s.reviews,0);
  const rr=calcRR(revenue);
  const cv1=leads>0?Math.round(bookings/leads*100):null;
  const cv2=bookings>0?Math.round(visits/bookings*100):null;
  const cv3=visits>0?Math.round(newSalesCount/visits*100):null;
  return{revenue,leads,bookings,visits,newSalesCount,renewals,massage,reviews,rr,cv1,cv2,cv3,n:ss.length};
}

function getPlan(st){return plans[monthKey()+'_'+st]||{};}

function badge(p){
  if(p===null||p===undefined)return'<span class="badge" style="background:var(--bg2);color:var(--text3)">нет данных</span>';
  if(p>=100)return`<span class="badge badge-green">✓ В плане</span>`;
  if(p>=85)return`<span class="badge badge-amber">⚠ Ускориться</span>`;
  return`<span class="badge badge-red">✗ Отстаём</span>`;
}

function delta(cur,prev){
  if(!prev)return'';
  const d=Math.round((cur-prev)/prev*100);
  if(d>0)return`<span class="delta-pos">▲ ${d}%</span>`;
  if(d<0)return`<span class="delta-neg">▼ ${Math.abs(d)}%</span>`;
  return`<span class="delta-neu">= 0%</span>`;
}

const CONDITION_LABELS={
  revenue:'Выручка',new_sales:'Новых продаж',renewals:'Продлений',
  bookings:'Записей на пробное',visits:'Доходимость',
  massage:'Записей на массаж',reviews:'Отзывов',conv_cv3:'CV приход→продажа'
};
const CONDITION_UNITS={
  revenue:' ₽',new_sales:' шт',renewals:' шт',bookings:' шт',
  visits:' чел',massage:' шт',reviews:' шт',conv_cv3:'%'
};

function conditionLabel(type,val){
  return`${CONDITION_LABELS[type]||type} ≥ ${type==='revenue'?fmt(val):val}${CONDITION_UNITS[type]||''}`;
}

function updateConditionLabel(){
  const type=document.getElementById('m-condition-type').value;
  document.getElementById('m-condition-label').textContent='Порог (≥), '+
    (type==='revenue'?'₽':type==='conv_cv3'?'%':'шт/чел');
}

function marathonProgress(m,ss){
  const msShifts=ss.filter(s=>s.date>=m.date_start&&s.date<=m.date_end);
  const type=m.condition_type;
  let val=0;
  if(type==='revenue') val=msShifts.reduce((a,s)=>a+s.newSales+s.renew+s.restore,0);
  else if(type==='new_sales') val=msShifts.filter(s=>s.newSales>0).length;
  else if(type==='renewals') val=msShifts.filter(s=>s.renew>0).length;
  else if(type==='bookings') val=msShifts.reduce((a,s)=>a+s.bookings,0);
  else if(type==='visits') val=msShifts.reduce((a,s)=>a+s.visits,0);
  else if(type==='massage') val=msShifts.reduce((a,s)=>a+s.massage,0);
  else if(type==='reviews') val=msShifts.reduce((a,s)=>a+s.reviews,0);
  else if(type==='conv_cv3'){
    const v=msShifts.reduce((a,s)=>a+s.visits,0);
    const sv=msShifts.filter(s=>s.newSales>0).length;
    val=v>0?Math.round(sv/v*100):0;
  }
  const target=+m.condition_value||1;
  const pct=Math.min(Math.round(val/target*100),100);
  return{val,target,pct,done:val>=target};
}

function funnelHtml(fact,plan){
  const stages=[
    {label:'Лиды',fact:fact.leads,plan:plan.leads||0},
    {label:'Записи',fact:fact.bookings,plan:plan.bookings||0,cv:fact.cv1,cvPlan:plan.cv1||0},
    {label:'Доходимость',fact:fact.visits,plan:plan.visits||0,cv:fact.cv2,cvPlan:plan.cv2||0},
    {label:'Новые продажи',fact:fact.newSalesCount,plan:plan.new_clients||0,cv:fact.cv3,cvPlan:plan.cv3||0},
  ];
  return`<div>${stages.map((s,i)=>`
    ${i>0?`<div class="funnel-arrow">↓ ${s.cv!==null?`<span class="${s.cv>=(s.cvPlan||0)?'cv-good':s.cv>=(s.cvPlan||0)*0.85?'cv-mid':'cv-bad'}">${s.cv}%${s.cvPlan?' (план '+s.cvPlan+'%)':''}</span>`:'нет данных'}</div>`:''}
    <div class="funnel-stage"><span class="funnel-label">${s.label}</span><span style="font-weight:700">${s.fact}</span>${s.plan?`<span style="font-size:11px;color:var(--text3);margin-left:8px">план ${s.plan}</span>`:''}</div>`).join('')}</div>`;
}

        <div class="metric"><div class="metric-label">CV приход→продажа</div><div class="metric-val">${plan.cv3||'—'}${plan.cv3?'%':''}</div></div>
      </div>
    </div>`;
  });
  document.getElementById('plans-content').innerHTML=html;
}

function openPlanModal(){
  document.getElementById('plan-month').value=monthKey();
  ['Империал','Мечта'].forEach(st=>{
    const plan=getPlan(st);const pfx=st==='Империал'?'imp':'mec';
    document.getElementById(pfx+'-revenue').value=plan.revenue||'';
    document.getElementById(pfx+'-new').value=plan.new_clients||'';
    document.getElementById(pfx+'-leads').value=plan.leads||'';
    document.getElementById(pfx+'-bookings').value=plan.bookings||'';
    document.getElementById(pfx+'-visits').value=plan.visits||'';
    document.getElementById(pfx+'-renewals').value=plan.renewals||'';
    document.getElementById(pfx+'-cv1').value=plan.cv1||'';
    document.getElementById(pfx+'-cv2').value=plan.cv2||'';
    document.getElementById(pfx+'-cv3').value=plan.cv3||'';
  });
  document.getElementById('plan-msg').style.display='none';
  document.getElementById('plan-modal').style.display='flex';
}

function savePlan(){
  const m=document.getElementById('plan-month').value||monthKey();
  ['Империал','Мечта'].forEach(st=>{
    const pfx=st==='Империал'?'imp':'mec';
    plans[m+'_'+st]={
      revenue:+document.getElementById(pfx+'-revenue').value||0,
      new_clients:+document.getElementById(pfx+'-new').value||0,
      leads:+document.getElementById(pfx+'-leads').value||0,
      bookings:+document.getElementById(pfx+'-bookings').value||0,
      visits:+document.getElementById(pfx+'-visits').value||0,
      renewals:+document.getElementById(pfx+'-renewals').value||0,
      cv1:+document.getElementById(pfx+'-cv1').value||0,
      cv2:+document.getElementById(pfx+'-cv2').value||0,
      cv3:+document.getElementById(pfx+'-cv3').value||0,
    };
  });
  localStorage.setItem('ls_plans_v2',JSON.stringify(plans));
  document.getElementById('plan-msg').style.display='block';
  setTimeout(()=>{closeModal('plan-modal');renderAll();},900);
}

function openMarathonModal(){
  document.getElementById('m-title').value='';
  document.getElementById('m-desc').value='';
  document.getElementById('m-prize').value='';
  document.getElementById('m-start').value=today();
  document.getElementById('m-end').value='';
  document.getElementById('m-condition-type').value='revenue';
  document.getElementById('m-condition-value').value='';
  updateConditionLabel();
  document.getElementById('marathon-msg').style.display='none';
  document.getElementById('marathon-modal').style.display='flex';
}

async function saveMarathon(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){alert('Введите название');return;}
  const {error}=await sb.from('marathons').insert({
    title,
    description:document.getElementById('m-desc').value.trim(),
    prize:+document.getElementById('m-prize').value||0,
    date_start:document.getElementById('m-start').value,
    date_end:document.getElementById('m-end').value,
    condition_type:document.getElementById('m-condition-type').value,
    condition_value:+document.getElementById('m-condition-value').value||0,
    active:true
  });
  if(error){alert('Ошибка: '+error.message);return;}
  document.getElementById('marathon-msg').style.display='block';
  setTimeout(async()=>{closeModal('marathon-modal');await loadData();},900);
}

async function stopMarathon(id){
  if(!confirm('Завершить марафон?'))return;
  await sb.from('marathons').update({active:false}).eq('id',id);
  await loadData();
}

async function deleteMarathon(id){
  if(!confirm('Удалить?'))return;
  await sb.from('marathons').delete().eq('id',id);
  await loadData();
}

function closeModal(id){document.getElementById(id).style.display='none';}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['overview','mom','studios','admins','marathons','plans'][i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

document.getElementById('pin-field').focus();
</script>
</body>
